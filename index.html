<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Génesis — Plan de Trabajo APIs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  
  :root {
    --obsidian: #0B0F1A;
    --deep: #141B2D;
    --slate: #1E2A3A;
    --silver: #8B95A5;
    --pearl: #F0F2F5;
    --white: #FFFFFF;
    --primary: #4F46E5;
    --primary-hover: #6366F1;
    --primary-soft: #818CF8;
    --primary-wash: #E0E7FF;
    --success: #10B981;
    --warning: #F59E0B;
    --critical: #EF4444;
    --info: #3B82F6;
    --sidebar-w: 240px;
    --font: 'Plus Jakarta Sans', sans-serif;
    --mono: 'JetBrains Mono', monospace;
  }

  body {
    font-family: var(--font);
    background: var(--pearl);
    color: var(--obsidian);
    display: flex;
    min-height: 100vh;
    font-size: 14px;
  }

  /* === SIDEBAR === */
  #sidebar {
    width: var(--sidebar-w);
    min-height: 100vh;
    background: var(--obsidian);
    position: fixed;
    top: 0; left: 0;
    display: flex;
    flex-direction: column;
    z-index: 100;
    overflow-y: auto;
  }

  .sidebar-logo {
    padding: 24px 20px 20px;
    border-bottom: 1px solid var(--slate);
  }

  .sidebar-logo .g-badge {
    width: 36px; height: 36px;
    background: var(--primary);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 800; color: white;
    margin-bottom: 10px;
    flex-shrink: 0;
  }

  .sidebar-logo h1 {
    color: white; font-size: 15px; font-weight: 700;
    line-height: 1.2;
  }

  .sidebar-logo p {
    color: var(--silver); font-size: 11px; margin-top: 3px;
  }

  .sidebar-nav {
    flex: 1;
    padding: 12px 0;
  }

  .sidebar-section-label {
    font-size: 10px; font-weight: 600; color: var(--silver);
    letter-spacing: 0.08em; text-transform: uppercase;
    padding: 10px 20px 4px;
  }

  .sidebar-link {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 20px;
    color: var(--silver);
    cursor: pointer;
    font-size: 12.5px;
    font-weight: 500;
    border-left: 2px solid transparent;
    transition: all 0.15s;
    text-decoration: none;
  }

  .sidebar-link:hover {
    color: white;
    background: var(--slate);
    border-left-color: var(--primary-soft);
  }

  .sidebar-link.active {
    color: white;
    background: var(--deep);
    border-left-color: var(--primary);
  }

  .sidebar-link .count {
    margin-left: auto;
    background: var(--slate);
    color: var(--silver);
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 10px;
    font-family: var(--mono);
  }

  .sidebar-deadline {
    padding: 16px 20px;
    border-top: 1px solid var(--slate);
    background: var(--deep);
  }

  .sidebar-deadline p {
    font-size: 11px; color: var(--silver);
  }

  .sidebar-deadline strong {
    color: var(--warning);
    display: block;
    font-family: var(--mono);
    font-size: 13px;
    margin-top: 2px;
  }

  /* === MAIN CONTENT === */
  #main {
    margin-left: var(--sidebar-w);
    flex: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* === TOPBAR === */
  #topbar {
    background: white;
    border-bottom: 1px solid #e2e8f0;
    padding: 16px 28px;
    display: flex; align-items: center; gap: 16px;
    position: sticky; top: 0; z-index: 50;
  }

  #topbar h2 {
    font-size: 16px; font-weight: 700; color: var(--obsidian);
    flex: 1;
  }

  .search-box {
    display: flex; align-items: center; gap: 8px;
    background: var(--pearl);
    border: 1px solid #d1d5db;
    border-radius: 8px;
    padding: 7px 12px;
    width: 240px;
  }

  .search-box input {
    border: none; background: transparent;
    font-family: var(--font); font-size: 13px;
    color: var(--obsidian); outline: none; width: 100%;
  }

  .search-icon { color: var(--silver); font-size: 14px; }

  .filter-group {
    display: flex; align-items: center; gap: 8px;
  }

  .filter-select {
    padding: 7px 10px; border-radius: 8px;
    border: 1px solid #d1d5db;
    background: var(--pearl);
    font-family: var(--font); font-size: 12px;
    color: var(--obsidian); cursor: pointer; outline: none;
  }

  .btn-save {
    display: flex; align-items: center; gap: 6px;
    background: var(--primary); color: white;
    border: none; border-radius: 8px;
    padding: 8px 16px; font-family: var(--font);
    font-size: 13px; font-weight: 600;
    cursor: pointer; transition: background 0.15s;
  }

  .btn-save:hover { background: var(--primary-hover); }
  
  .btn-save.saved {
    background: var(--success);
  }

  /* === STATS BAR === */
  #statsbar {
    padding: 16px 28px;
    display: flex; gap: 12px; flex-wrap: wrap;
  }

  .stat-card {
    background: white; border-radius: 10px;
    border: 1px solid #e2e8f0;
    padding: 14px 18px;
    min-width: 140px; flex: 1;
  }

  .stat-card .label {
    font-size: 11px; color: var(--silver);
    font-weight: 600; letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .stat-card .value {
    font-family: var(--mono);
    font-size: 22px; font-weight: 700;
    color: var(--obsidian);
    margin-top: 4px;
  }

  .stat-card.green .value { color: var(--success); }
  .stat-card.amber .value { color: var(--warning); }
  .stat-card.red .value { color: var(--critical); }
  .stat-card.blue .value { color: var(--info); }

  /* === TABLE SECTION === */
  .table-section {
    padding: 0 28px 28px;
  }

  .section-header {
    display: flex; align-items: center; gap: 10px;
    padding: 16px 0 10px;
    cursor: pointer;
  }

  .section-header h3 {
    font-size: 13px; font-weight: 700;
    color: var(--obsidian); text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .section-header .cat-count {
    font-family: var(--mono); font-size: 11px;
    background: var(--primary-wash); color: var(--primary);
    padding: 2px 8px; border-radius: 20px;
    font-weight: 600;
  }

  .section-header .collapse-icon {
    margin-left: auto; color: var(--silver);
    font-size: 12px; transition: transform 0.2s;
  }

  .section-header.collapsed .collapse-icon {
    transform: rotate(-90deg);
  }

  .table-wrapper {
    background: white; border-radius: 10px;
    border: 1px solid #e2e8f0;
    overflow: hidden;
    margin-bottom: 8px;
  }

  .table-wrapper.hidden { display: none; }

  table {
    width: 100%; border-collapse: collapse;
    font-size: 12.5px;
  }

  thead th {
    background: var(--obsidian);
    color: var(--silver);
    font-size: 10.5px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.06em;
    padding: 10px 12px;
    text-align: left;
    white-space: nowrap;
  }

  tbody tr {
    border-bottom: 1px solid #f1f5f9;
    transition: background 0.1s;
  }

  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #fafbfd; }
  
  tbody tr.hidden { display: none; }

  td {
    padding: 10px 12px;
    vertical-align: middle;
  }

  .td-num {
    font-family: var(--mono); font-size: 11px;
    color: var(--silver); width: 32px; text-align: center;
  }

  .td-nombre {
    min-width: 180px; max-width: 260px;
    font-weight: 600; color: var(--obsidian);
    line-height: 1.3;
  }

  .td-nombre small {
    display: block;
    font-weight: 400; color: var(--silver);
    font-size: 11px; margin-top: 1px;
  }

  /* EDITABLE CELLS */
  .edit-select {
    font-family: var(--font);
    font-size: 12px;
    border: 1px solid #e2e8f0;
    border-radius: 6px;
    padding: 5px 8px;
    background: var(--pearl);
    color: var(--obsidian);
    cursor: pointer; outline: none;
    width: 100%;
    transition: border-color 0.15s;
  }

  .edit-select:focus {
    border-color: var(--primary);
    background: white;
  }

  .person-cell {
    min-width: 160px;
  }

  .person-info {
    margin-top: 4px;
    font-family: var(--mono);
    font-size: 10.5px; color: var(--primary-soft);
    display: flex; align-items: center; gap: 4px;
  }

  /* PROGRESS */
  .progress-cell {
    min-width: 120px;
  }

  .progress-wrap {
    display: flex; align-items: center; gap: 8px;
  }

  .progress-bar {
    flex: 1; height: 6px;
    background: #e2e8f0; border-radius: 99px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%; border-radius: 99px;
    background: var(--primary);
    transition: width 0.3s;
  }

  .progress-fill.green { background: var(--success); }
  .progress-fill.amber { background: var(--warning); }

  .progress-input {
    width: 44px; border: 1px solid #e2e8f0;
    border-radius: 6px; padding: 4px 4px;
    font-family: var(--mono); font-size: 11px;
    text-align: center; outline: none; background: var(--pearl);
  }

  .progress-input:focus {
    border-color: var(--primary); background: white;
  }

  /* STATUS BADGE */
  .status-badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 10px; border-radius: 99px;
    font-size: 11px; font-weight: 600;
    white-space: nowrap; cursor: pointer;
    border: none; font-family: var(--font);
    transition: opacity 0.15s;
  }

  .status-badge:hover { opacity: 0.85; }
  .status-badge .dot { width: 6px; height: 6px; border-radius: 50%; }

  .s-contratada { background: #d1fae5; color: #065f46; }
  .s-contratada .dot { background: var(--success); }

  .s-pendiente { background: #fef3c7; color: #92400e; }
  .s-pendiente .dot { background: var(--warning); }

  .s-configurar { background: #dbeafe; color: #1e40af; }
  .s-configurar .dot { background: var(--info); }

  .s-via-fal { background: #ede9fe; color: #5b21b6; }
  .s-via-fal .dot { background: #7c3aed; }

  .s-post-launch { background: #f1f5f9; color: #475569; }
  .s-post-launch .dot { background: var(--silver); }

  .s-en-proceso { background: #e0e7ff; color: #3730a3; }
  .s-en-proceso .dot { background: var(--primary); }

  /* PRIORITY BADGE */
  .prio-badge {
    font-size: 10px; font-weight: 700;
    padding: 2px 7px; border-radius: 4px;
    white-space: nowrap;
  }

  .prio-critica { background: #fee2e2; color: #991b1b; }
  .prio-alta { background: #fef3c7; color: #92400e; }
  .prio-post { background: #f1f5f9; color: #64748b; }

  /* EQUIPO */
  .equipo-pill {
    display: inline-block; width: 28px; height: 28px;
    border-radius: 50%; font-weight: 700; font-size: 12px;
    display: flex; align-items: center; justify-content: center;
  }

  .eq-a { background: var(--primary-wash); color: var(--primary); }
  .eq-b { background: #d1fae5; color: #065f46; }
  .eq-tbd { background: #f1f5f9; color: var(--silver); }

  /* TOAST */
  #toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--obsidian); color: white;
    padding: 12px 20px; border-radius: 10px;
    font-size: 13px; font-weight: 500;
    transform: translateY(80px); opacity: 0;
    transition: all 0.3s; z-index: 9999;
    display: flex; align-items: center; gap: 8px;
  }

  #toast.show { transform: translateY(0); opacity: 1; }

  /* RESPONSIVE */
  @media (max-width: 1100px) {
    :root { --sidebar-w: 0px; }
    #sidebar { display: none; }
    #main { margin-left: 0; }
  }

  .total-progress-outer {
    background: white; border-radius: 10px;
    border: 1px solid #e2e8f0;
    padding: 16px 20px;
    flex: 2; min-width: 260px;
  }

  .total-progress-outer .label {
    font-size: 11px; color: var(--silver); font-weight: 600;
    letter-spacing: 0.04em; text-transform: uppercase;
    margin-bottom: 8px;
  }

  .total-bar {
    height: 10px; background: #e2e8f0; border-radius: 99px; overflow: hidden;
  }

  .total-fill {
    height: 100%; border-radius: 99px;
    background: linear-gradient(90deg, var(--primary) 0%, var(--primary-soft) 100%);
    transition: width 0.4s;
  }

  .total-pct {
    font-family: var(--mono); font-size: 11px; color: var(--primary);
    margin-top: 5px; font-weight: 600;
  }
</style>
</head>

    </div>
    <div class="stat-card">

    </div>
    <div class="total-progress-outer">

      <div class="total-pct" id="totalPct">0% completado</div>

  </div>

  <!-- TABLE SECTIONS -->
  <div class="table-section" id="tableContainer"></div>

</div>

  btn.classList.add('saved');
  showToast('Cambios guardados correctamente');
  setTimeout(() => {
    btn.textContent = '💾 Guardar';
    btn.classList.remove('saved');
  }, 2000);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = '✅ ' + msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// Get unique categories in order
const CATEGORIES = [];
RAW_DATA.forEach(s => {
  if (!CATEGORIES.includes(s.categoria)) CATEGORIES.push(s.categoria);
});

// Build sidebar links
function buildSidebar() {
  const nav = document.querySelector('.sidebar-nav');
  const icons = {
    'IA CORE': '🧠',
    'DATA & ANALYTICS': '📊',
    'ERP & ENTERPRISE': '🏢',
    'GENERACIÓN CREATIVA (Imágenes & Video)': '🎨',
    'AUDIO & VOZ': '🔊',
    'DISEÑO': '✏️',
    'PUBLICACIÓN & DISTRIBUCIÓN': '📤',
    'INVESTIGACIÓN CIENTÍFICA': '🔬',
    'ALMACENAMIENTO & INFRAESTRUCTURA': '☁️',
    'COMUNICACIÓN & CAMPO': '📱',
    'TECH SCOUT & MONITOREO': '📡',
    'PRECIOS DE REFERENCIA (Módulo Átomos)': '💲',
    'FINANCIERO': '💰',
    'PUBLICACIÓN SOCIAL ADICIONAL': '📣',
    'PAID MEDIA & ADVERTISING ADICIONAL': '📢',
    'SEO & ANALYTICS ADICIONAL': '🔎',
    'INFLUENCERS & SOCIAL LISTENING': '👥',
    'DISEÑO ADICIONAL': '🖌️',
    'CONECTORES DE DATOS': '🔗',
    'INFLUENCER DATA AGGREGATION': '📈',
  };

  CATEGORIES.forEach(cat => {
    const count = RAW_DATA.filter(s => s.categoria === cat).length;
    const shortCat = cat.split(' ').slice(0, 3).join(' ');
    const link = document.createElement('a');
    link.className = 'sidebar-link';
    link.id = 'link-' + cat;
    link.innerHTML = `${icons[cat] || '⚙️'} ${shortCat} <span class="count">${count}</span>`;
    link.onclick = () => filterCat(cat);
    nav.appendChild(link);
  });
}

// Build status badge
function statusBadge(status, idx) {
  const cls = STATUS_CLASS[status] || 's-pendiente';
  const label = status || 'PENDIENTE';
  return `<button class="status-badge ${cls}" onclick="cycleStatus(${idx})" title="Clic para cambiar">
    <span class="dot"></span>${label}
  </button>`;
}

function cycleStatus(idx) {
  const cur = data[idx].status;
  const next = STATUS_LIST[(STATUS_LIST.indexOf(cur) + 1) % STATUS_LIST.length];
  data[idx].status = next;
  // Update badge
  const cell = document.getElementById('status-' + idx);
  if (cell) cell.innerHTML = statusBadge(next, idx);
  updateStats();
}

// Priority badge
function prioBadge(p) {
  if (p === 'CRÍTICA') return `<span class="prio-badge prio-critica">CRÍTICA</span>`;
  if (p === 'ALTA') return `<span class="prio-badge prio-alta">ALTA</span>`;
  return `<span class="prio-badge prio-post">POST</span>`;
}

// Build table rows
function buildTables() {
  const container = document.getElementById('tableContainer');
  container.innerHTML = '';

  CATEGORIES.forEach(cat => {
    const catServices = data.filter(s => s.categoria === cat);
    const catId = cat.replace(/\W/g, '_');

    const section = document.createElement('div');
    section.className = 'cat-section';
    section.dataset.cat = cat;

    const header = document.createElement('div');
    header.className = 'section-header';
    header.innerHTML = `
      <h3>${cat}</h3>
      <span class="cat-count">${catServices.length} servicios</span>
      <span class="collapse-icon">▾</span>
    `;
    header.onclick = function() {
      this.classList.toggle('collapsed');
      const wrap = document.getElementById('wrap-' + catId);
      wrap.classList.toggle('hidden');
    };

    const wrap = document.createElement('div');
    wrap.className = 'table-wrapper';
    wrap.id = 'wrap-' + catId;

    const table = document.createElement('table');
    table.innerHTML = `
      <thead>
        <tr>
          <th>#</th>
          <th>Servicio</th>
          <th>Prioridad</th>
          <th>Equipo</th>
          <th>Responsable</th>
          <th>📞 Responsable</th>
          <th>Sponsor</th>
          <th>📞 Sponsor</th>
          <th>% Avance</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="tbody-${catId}"></tbody>
    `;

    wrap.appendChild(table);
    section.appendChild(header);
    section.appendChild(wrap);
    container.appendChild(section);
  });

  renderRows();
}

function renderRows() {
  // Clear all tbodies
  CATEGORIES.forEach(cat => {
    const catId = cat.replace(/\W/g, '_');
    const tbody = document.getElementById('tbody-' + catId);
    if (tbody) tbody.innerHTML = '';
  });

  data.forEach((svc, idx) => {
    const catId = svc.categoria.replace(/\W/g, '_');
    const tbody = document.getElementById('tbody-' + catId);
    if (!tbody) return;

    // Build responsable options
    let respOpts = '<option value="">— Sin asignar —</option>';
    RESPONSABLES.forEach(r => {
      const sel = r.nombre === svc.responsable ? ' selected' : '';
      respOpts += `<option value="${r.nombre}"${sel}>${r.nombre}</option>`;
    });

    // Build sponsor options
    let sponsorOpts = '<option value="">— Sin asignar —</option>';
    SPONSORS.forEach(s => {
      const sel = s.nombre === svc.sponsor ? ' selected' : '';
      sponsorOpts += `<option value="${s.nombre}"${sel}>${s.nombre}</option>`;
    });

    // Build equipo options
    const eqOpts = ['A','B','TBD'].map(e =>
      `<option value="${e}"${svc.equipo === e ? ' selected' : ''}>${e}</option>`
    ).join('');

    const avance = parseInt(svc.avance) || 0;
    const pctClass = avance >= 100 ? 'green' : (avance >= 50 ? 'amber' : '');
    const respTel = RESP_MAP[svc.responsable] || svc.celular_responsable || '';
    const sponsorTel = SPONSOR_MAP[svc.sponsor] || svc.celular_sponsor || '';

    const tr = document.createElement('tr');
    tr.dataset.idx = idx;
    tr.dataset.nombre = svc.nombre.toLowerCase();
    tr.dataset.status = svc.status;
    tr.dataset.equipo = svc.equipo;
    tr.dataset.prioridad = svc.prioridad;
    tr.dataset.cat = svc.categoria;

    tr.innerHTML = `
      <td class="td-num">${svc.id}</td>
      <td class="td-nombre">
        ${svc.nombre}
        <small>${svc.proveedor}</small>
      </td>
      <td>${prioBadge(svc.prioridad)}</td>
      <td>
        <select class="edit-select" style="width:70px"
          onchange="updateField(${idx},'equipo',this.value)">
          <option value="">—</option>
          ${eqOpts}
        </select>
      </td>
      <td class="person-cell">
        <select class="edit-select"
          onchange="updateResponsable(${idx},this.value)">
          ${respOpts}
        </select>
        <div class="person-info" id="rtel-${idx}">${respTel ? '📞 ' + respTel : ''}</div>
      </td>
      <td style="font-family:var(--mono);font-size:11px;color:var(--primary-soft)" id="rtel2-${idx}">${respTel}</td>
      <td class="person-cell">
        <select class="edit-select"
          onchange="updateSponsor(${idx},this.value)">
          ${sponsorOpts}
        </select>
        <div class="person-info" id="stel-${idx}">${sponsorTel ? '📞 ' + sponsorTel : ''}</div>
      </td>
      <td style="font-family:var(--mono);font-size:11px;color:var(--primary-soft)" id="stel2-${idx}">${sponsorTel}</td>
      <td class="progress-cell">
        <div class="progress-wrap">
          <div class="progress-bar">
            <div class="progress-fill ${pctClass}" id="pbar-${idx}" style="width:${avance}%"></div>
          </div>
          <input type="number" class="progress-input" min="0" max="100"
            value="${avance}" id="pinput-${idx}"
            onchange="updateProgress(${idx},this.value)"
            oninput="updateProgress(${idx},this.value)">
        </div>
      </td>
      <td id="status-${idx}">${statusBadge(svc.status, idx)}</td>
    `;

    tbody.appendChild(tr);
  });
}

function updateField(idx, field, value) {
  data[idx][field] = value;
  const tr = document.querySelector(`tr[data-idx="${idx}"]`);
  if (tr) tr.dataset[field] = value;
}

function updateResponsable(idx, value) {
  data[idx].responsable = value;
  const tel = RESP_MAP[value] || '';
  data[idx].celular_responsable = tel;
  const tel1 = document.getElementById('rtel-' + idx);
  const tel2 = document.getElementById('rtel2-' + idx);
  if (tel1) tel1.innerHTML = tel ? '📞 ' + tel : '';
  if (tel2) tel2.textContent = tel;
}

function updateSponsor(idx, value) {
  data[idx].sponsor = value;
  const tel = SPONSOR_MAP[value] || '';
  data[idx].celular_sponsor = tel;
  const tel1 = document.getElementById('stel-' + idx);
  const tel2 = document.getElementById('stel2-' + idx);
  if (tel1) tel1.innerHTML = tel ? '📞 ' + tel : '';
  if (tel2) tel2.textContent = tel;
}

function updateProgress(idx, value) {
  const v = Math.min(100, Math.max(0, parseInt(value) || 0));
  data[idx].avance = v;
  const bar = document.getElementById('pbar-' + idx);
  if (bar) {
    bar.style.width = v + '%';
    bar.className = 'progress-fill ' + (v >= 100 ? 'green' : v >= 50 ? 'amber' : '');
  }
  updateStats();
}

function updateStats() {
  const all = data;
  document.getElementById('st-total').textContent = all.length;
  document.getElementById('st-contratada').textContent = all.filter(s => s.status === 'CONTRATADA').length;
  document.getElementById('st-pendiente').textContent = all.filter(s => s.status === 'PENDIENTE').length;
  document.getElementById('st-configurar').textContent = all.filter(s => s.status === 'CONFIGURAR').length;
  document.getElementById('st-post').textContent = all.filter(s => s.status === 'POST-LAUNCH').length;

  const totalPct = Math.round(all.reduce((acc, s) => acc + (parseInt(s.avance)||0), 0) / all.length);
  document.getElementById('totalFill').style.width = totalPct + '%';
  document.getElementById('totalPct').textContent = totalPct + '% completado';
}

function filterCat(cat) {
  activeCategory = cat;
  // Update sidebar links
  document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
  const activeLink = document.getElementById('link-' + cat) || document.querySelector(`[id="link-${cat}"]`);
  if (activeLink) activeLink.classList.add('active');

  // Show/hide sections
  document.querySelectorAll('.cat-section').forEach(sec => {
    if (cat === 'all' || sec.dataset.cat === cat) {
      sec.style.display = '';
    } else {
      sec.style.display = 'none';
    }
  });

  const title = cat === 'all' ? 'Todos los servicios' : cat;
  document.getElementById('topbar-title').textContent = title;
  applyFilters();
}

function applyFilters() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const status = document.getElementById('filterStatus').value;
  const equipo = document.getElementById('filterEquipo').value;
  const prio = document.getElementById('filterPrioridad').value;

  document.querySelectorAll('tbody tr').forEach(tr => {
    const idx = parseInt(tr.dataset.idx);
    const svc = data[idx];
    let show = true;
    if (search && !svc.nombre.toLowerCase().includes(search) && !svc.proveedor.toLowerCase().includes(search)) show = false;
    if (status && svc.status !== status) show = false;
    if (equipo && svc.equipo !== equipo) show = false;
    if (prio && svc.prioridad !== prio) show = false;
    if (activeCategory !== 'all' && svc.categoria !== activeCategory) show = false;
    tr.style.display = show ? '' : 'none';
  });
}

// INIT
buildSidebar();
buildTables();
updateStats();

// Auto-save every 2 minutes
setInterval(saveData, 120000);
</script>
